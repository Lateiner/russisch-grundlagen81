<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lernkartei: Russische Possessivadjektive</title>
    <style>
        :root {
            --primary-green: #2e7d32;
            --light-green: #e8f5e9;
            --accent-green: #4caf50;
            --dark-green: #1b5e20;
            --bg-color: #f1f8f1;
            --text-color: #333;
            --card-width: 450px;
            --card-height: 280px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            color: var(--dark-green);
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        .progress {
            margin-bottom: 20px;
            font-weight: bold;
            color: var(--primary-green);
            font-size: 1.1rem;
        }

        /* Flashcard Styles */
        .flashcard-container {
            perspective: 1000px;
            width: var(--card-width);
            height: var(--card-height);
            margin: 0 auto 30px auto;
            cursor: pointer;
        }

        .flashcard {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 15px;
        }

        .flashcard.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            border-radius: 15px;
            border: 4px solid var(--primary-green);
            background: white;
        }

        .card-back {
            transform: rotateY(180deg);
            background-color: var(--light-green);
        }

        .card-text {
            text-align: center;
            word-wrap: break-word;
            max-width: 100%;
            transition: font-size 0.2s;
        }

        .front-text {
            font-weight: bold;
            color: var(--dark-green);
        }

        .back-text {
            color: var(--primary-green);
        }

        /* Controls */
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        button {
            background-color: var(--primary-green);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button:hover {
            background-color: var(--accent-green);
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 3px rgba(0,0,0,0.1);
        }

        .btn-secondary {
            background-color: #6c757d;
        }
        .btn-secondary:hover {
            background-color: #5a6268;
        }

        .keyboard-hint {
            margin-top: 30px;
            font-size: 0.85rem;
            color: #777;
        }

        /* Mobile Responsiveness */
        @media (max-width: 500px) {
            :root {
                --card-width: 100%;
                --card-height: 220px;
            }
            h1 { font-size: 1.4rem; }
            .keyboard-hint { display: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Vokabel-Lernkartei</h1>
    <div class="progress" id="progress">1 / 86</div>

    <div class="flashcard-container" id="cardContainer">
        <div class="flashcard" id="card">
            <div class="card-face card-front">
                <div class="card-text front-text" id="frontText">Загрузка...</div>
            </div>
            <div class="card-face card-back">
                <div class="card-text back-text" id="backText">Laden...</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button onclick="shuffleCards()" class="btn-secondary">🔀 Mischen</button>
        <button onclick="goToStart()" class="btn-secondary">🏠 Anfang</button>
        <button onclick="prevCard()">← Vorherige</button>
        <button onclick="nextCard()">Nächste →</button>
    </div>

    <div class="keyboard-hint">
        Tipp: <b>Pfeiltasten</b> zum Navigieren | <b>Leertaste/Enter</b> zum Umdrehen | <b>Pos1</b> für Anfang
    </div>
</div>

<script>
    // Vokabeldaten
    const originalVocabulary = [
        ["воро́на", "Krähe"], ["лиса́", "Fuchs"], ["обезья́на", "Affe"], ["оле́нь", "Hirsch"],
        ["дельфи́н", "Delfin"], ["пингви́н", "Pinguin"], ["павли́н", "Pfau"], ["соба́ка", "Hund"],
        ["ко́шка", "Katze"], ["пти́ца", "Vogel"], ["волк", "Wolf"], ["за́яц", "Hase"],
        ["верблю́д", "Kamel"], ["медве́дь", "Bär"], ["овца́", "Schaf"], ["коро́ва", "Kuh"],
        ["змея́", "Schlange"], ["орёл", "Adler"], ["бе́лка", "Eichhörnchen"], ["барсу́к", "Dachs"],
        ["коза́", "Ziege"], ["лягу́шка", "Frosch"], ["слон", "Elefant"], ["бара́н", "Widder / Schafbock"],
        ["хвост", "Schwanz"], ["у́хо (Pl. у́ши)", "Ohr"], ["ми́ска", "Napf / Schüssel"], ["зерно́", "Korn / Getreide"],
        ["рог (Pl. рога́)", "Horn / Geweih"], ["зуб", "Zahn"], ["крыло́", "Flügel"], ["яйцо́", "Ei"],
        ["перо́", "Feder"], ["гнездо́", "Nest"], ["дом", "Haus"], ["след", "Spur / Fußabdruck"],
        ["шерсть", "Wolle / Fell"], ["молоко́", "Milch"], ["яд", "Gift"], ["мя́со", "Fleisch"],
        ["берло́га", "Bärenhöhle / Bau"], ["похо́дка", "Gang / Schrittweise"], ["мо́рдочка", "Schnauze / Gesichtchen"], ["би́вень", "Stoßzahn"],
        ["клык", "Fangzahn"], ["но́ра", "Bau / Höhle"], ["па́нцирь", "Panzer"], ["жир", "Fett"],
        ["хо́бот", "Rüssel"], ["колоко́льчик", "Glöckchen"], ["услу́га", "Dienst / Gefälligkeit"], ["аппети́т", "Appetit"],
        ["хо́лод", "Kälte"], ["пра́во", "Recht"], ["душа́", "Seele"], ["восто́рг", "Begeisterung"],
        ["хи́трость", "List / Schläue"], ["конце́рт", "Konzert"], ["биле́т", "Ticket"], ["жизнь", "Leben"],
        ["соба́чий", "hündisch / Hunde-"], ["коша́чий", "kätzisch / Katzen-"], ["ли́сий", "fuchsartig / Fuchs-"], ["пти́чий", "vogelartig / Vogel-"],
        ["во́лчий", "wölfisch / Wolfs-"], ["за́ячий", "hasenartig / Hasen-"], ["медве́жий", "bärenhaft / Bären-"], ["верблю́жий", "Kamel-"],
        ["коро́вий", "Kuh-"], ["змеи́ный", "Schlangen-"], ["орли́ный", "Adler-"], ["бе́личий", "Eichhörnchen-"],
        ["ове́чий", "Schafs-"], ["слоно́вий", "Elefanten-"], ["образо́вывать / образова́ть", "bilden / formen"], ["меня́ть / измени́ть", "wechseln / ändern"],
        ["запомина́ть / запо́мнить", "merken / einprägen"], ["находи́ть / найти́", "finden"], ["ви́деть / уви́деть", "sehen"], ["покупа́ть / купи́ть", "kaufen"],
        ["есть / съесть", "essen"], ["пить / вы́пить", "trinken"], ["помога́ть / помо́чь", "helfen"], ["проверя́ть / прове́рить", "prüfen / kontrollieren"],
        ["испо́льзовать / воспо́льзоваться", "benutzen / gebrauchen"], ["повторя́ть / повтори́ть", "wiederholen"]
    ];

    let currentVocabulary = [...originalVocabulary];
    let currentIndex = 0;

    // Elemente
    const card = document.getElementById('card');
    const frontText = document.getElementById('frontText');
    const backText = document.getElementById('backText');
    const progressText = document.getElementById('progress');
    const cardContainer = document.getElementById('cardContainer');

    function updateCard() {
        // Karte zurücksetzen (Vorderseite zeigen) bevor Text geändert wird
        card.classList.remove('is-flipped');
        
        setTimeout(() => {
            const current = currentVocabulary[currentIndex];
            frontText.textContent = current[0];
            backText.textContent = current[1];
            
            progressText.textContent = `${currentIndex + 1} / ${currentVocabulary.length}`;
            
            adjustFontSize(frontText);
            adjustFontSize(backText);
        }, 150); // Kleiner Delay für glatteren Übergang
    }

    function flipCard() {
        card.classList.toggle('is-flipped');
    }

    function nextCard() {
        if (currentIndex < currentVocabulary.length - 1) {
            currentIndex++;
            updateCard();
        }
    }

    function prevCard() {
        if (currentIndex > 0) {
            currentIndex--;
            updateCard();
        }
    }

    function shuffleCards() {
        for (let i = currentVocabulary.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [currentVocabulary[i], currentVocabulary[j]] = [currentVocabulary[j], currentVocabulary[i]];
        }
        currentIndex = 0;
        updateCard();
    }

    function goToStart() {
        currentIndex = 0;
        updateCard();
    }

    function adjustFontSize(element) {
        const textLength = element.textContent.length;
        if (textLength > 30) {
            element.style.fontSize = "1.2rem";
        } else if (textLength > 15) {
            element.style.fontSize = "1.6rem";
        } else {
            element.style.fontSize = "2.2rem";
        }
    }

    // Event Listeners
    cardContainer.addEventListener('click', flipCard);

    document.addEventListener('keydown', (e) => {
        switch(e.key) {
            case ' ':
            case 'Enter':
                e.preventDefault();
                flipCard();
                break;
            case 'ArrowLeft':
                prevCard();
                break;
            case 'ArrowRight':
                nextCard();
                break;
            case 'Home':
                goToStart();
                break;
        }
    });

    // Start
    updateCard();
</script>

</body>
</html>
